          enum: [summary, experience, education, skills, languages, certifications, projects, interests]
        displayOrder: { type: integer, minimum: 0 }
        isVisible: { type: boolean }
        content:
          type: object
          additionalProperties: true

    CVSectionUpsert:
      type: object
