        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        salaryMin: { type: number, nullable: true }
        salaryMax: { type: number, nullable: true }
        category: { type: string, nullable: true }
        skills:
          type: array
          items: { type: string }
        status:
          type: string
          enum: [draft, pending_approval, published, expired, archived]
        viewsCount: { type: integer, minimum: 0 }
        expiresAt: { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    JobOfferCreate:
      type: object
      required: [title, description, contractType]
      properties:
        title: { type: string }
        description: { type: string }
        contractType:
          type: string
          enum: [CDI, CDD, Freelance, Stage, Alternance]
        location: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        salaryMin: { type: number, nullable: true }
        salaryMax: { type: number, nullable: true }
        category: { type: string, nullable: true }
        skills:
          type: array
          items: { type: string }
